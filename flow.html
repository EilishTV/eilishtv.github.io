<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flow Music Fullscreen</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: black;
      overflow: hidden;
    }

    .player-fullscreen {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
    }

    .player-fullscreen iframe {
      width: 100%;
      height: 100%;
      border: 0;
    }
  </style>
</head>

<body>
  <div class="player-fullscreen">
    <iframe
      src="https://tvlibree.com/html/fl/?get=Rmxvd19NdXNpY19YUA=="
      allow="autoplay; encrypted-media; fullscreen"
      allowfullscreen>
    </iframe>
  </div>
</body>
</html>
