<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Watch</title>

<link rel="stylesheet" href="../../css/index.css">

<!-- FONT AWESOME -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
  margin:0;
  background:#000;
  color:#fff;
  font-family:sans-serif;
  overflow-x:hidden;
}

/* HERO */
.hero{
  height:100vh;
  background-size:cover;
  background-position:center;
  background-attachment:fixed;
  display:flex;
  align-items:center;
  padding:60px;
  position:relative;
  box-sizing:border-box;
}

/* OVERLAY */
.overlay{
  position:absolute;
  inset:0;
  background:linear-gradient(
    to right,
    rgba(0,0,0,0.95) 20%,
    rgba(0,0,0,0.4) 60%,
    transparent
  );
}

/* CONTENIDO */
.content{
  position:relative;
  z-index:3;
  margin-top:10%;
  max-width:500px;
}

/* LOGO */
.logo{
  width:300px;
  height:120px;
  object-fit:contain;
  object-position:left center;
  margin-bottom:25px;
}

/* BOTONES */
.buttons{
  display:flex;
  align-items:center;
  gap:12px;
}

button{
  height:48px;
  padding:0 28px;
  border:none;
  font-size:15px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  cursor:pointer;
  transition:all 0.2s ease;
  outline:none;
}

/* PLAY BUTTON */
#playBtn{
  background:#fff;
  color:#000;
  font-weight:bold;
  border-radius:50px;
}

#playBtn:hover{
  background:#e6e6e6 !important;
  transform:scale(1.03);
}

#playBtn:active{
  transform:scale(0.96);
  background:#ccc !important;
}

/* MY LIST BUTTON */
.myListBtn{
  background:rgba(255,255,255,0.15);
  border:1px solid rgba(255,255,255,0.3);
  border-radius:50px;
  color:#fff;
}

.myListBtn:hover{
  background:rgba(255,255,255,0.35) !important;
  border-color:rgba(255,255,255,0.8);
  transform:scale(1.03);
}

.myListBtn:active{
  transform:scale(0.96);
  background:rgba(255,255,255,0.1) !important;
}

button i{
  font-size:14px;
}

/* INFO */
.meta{
  margin-top:12px;
  font-size:14px;
  color:#ccc;
}

/* TAGS */
.tags{
  margin-top:10px;
  display:flex;
  flex-wrap:wrap;
  gap:8px;
}

.tag{
  background:rgba(255,255,255,0.15);
  border:1px solid rgba(255,255,255,0.25);
  padding:6px 12px;
  border-radius:20px;
  font-size:12px;
  color:#fff;
  backdrop-filter:blur(4px);
  transition:0.2s;
  cursor:pointer;
}

.tag:hover{
  background:rgba(255,255,255,0.35);
}

#desc{
  margin-top:15px;
  line-height:1.5;
  color:#ddd;
}

/* ========================= */
/* MOBILE */
/* ========================= */

@media screen and (max-width:768px){

  body{
    background:#1A1D29;
  }

  .hero{
    height:auto;
    min-height:100dvh;
    flex-direction:column;
    padding:0;
    background:none !important;
    margin-top:70px;
    position:relative;
    overflow:hidden;
  }

  /* IMAGEN SUPERIOR */
  .hero::before{
    content:"";
    position:relative;
    z-index:1;
    width:100%;
    height:240px;
    display:block;

    background:
      linear-gradient(
        to bottom,
        rgba(26,29,41,0) 35%,
        rgba(26,29,41,0.45) 60%,
        rgba(26,29,41,0.82) 82%,
        #1A1D29 100%
      ),
      var(--bg-img);

    background-size:cover;
    background-position:center;

    margin-bottom:-3px;
  }

  /* DEGRADÉ EXTRA */
  .hero::after{
    content:"";
    position:relative;
    z-index:2;
    width:100%;
    height:90px;
    display:block;

    margin-top:-90px;
    margin-bottom:-0px;

    background:linear-gradient(
      to bottom,
      rgba(26,29,41,0) 0%,
      rgba(26,29,41,0.96) 82%,
      #1A1D29 100%
    );
  }

  .overlay{
    display:none;
  }

  .content{
    position:relative;
    z-index:5;

    margin-top:-35px;

    padding:20px;

    max-width:100%;
    width:100%;

    box-sizing:border-box;
  }

  .logo{
    width:200px;
    max-width:55vw;
    height:80px;

    object-fit:contain;

    margin-top:-60px;
    margin-bottom:15px;
  }

  .buttons{
    width:100%;
    gap:10px;
  }

  button{
    flex:1;
    height:46px;
    font-size:14px;
    padding:0 10px;
  }

  button:hover{
    transform:none;
  }

  button:active{
    transform:scale(0.92);
  }

  .meta{
    margin-top:10px;
    font-size:13px;
  }

  .tags{
    margin-top:8px;
  }

  .tag{
    font-size:11px;
    padding:5px 10px;
  }

  #desc{
    font-size:14px;
    margin-top:12px;
    line-height:1.45;
  }
}

/* ========================= */
/* GLOBAL LOADER */
/* ========================= */
.loader-container {
  position: fixed;
  inset: 0;
  background: #000; /* Fondo negro puro */
  z-index: 9999;    /* Por encima de todo */
  display: flex;
  align-items: center;
  justify-content: center;
  transition: opacity 0.4s ease, visibility 0.4s ease;
}

/* Clase para ocultarlo de forma fluida */
.loader-container.hidden {
  opacity: 0;
  visibility: hidden;
  pointer-events: none;
}

/* Animación del círculo de carga */
.spinner {
  width: 50px;
  height: 50px;
  border: 4px solid rgba(255, 255, 255, 0.1);
  border-top-color: #fff; /* Color blanco interactivo */
  border-radius: 50%;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  to {
    transform: rotate(360deg);
  }
}

</style>
</head>

<body>

  <!-- PANTALLA DE CARGA GLOBAL -->
<div id="globalLoader" class="loader-container">
  <div class="spinner"></div>
</div>

<nav>

    <a class="navLogo" href="/index.html">
        <img src="../../images/extras/logo.png" alt="EilishTV"/>
    </a>

    <!-- Main Menu -->
    <div class="navMenu">
        <a href="/browse/">Inicio</a>
        <a href="#">Peliculas</a>
        <a href="#">Shows</a>
        <a href="/browse/my-list/">Mi Lista</a>
    </div>

    <!-- Search -->
    <form class="searchContainer" action="/browse/search/" method="GET">
        <input 
            type="text" 
            class="searchInput" 
            name="q"
            placeholder="Search..."
        />

        <button type="submit" class="searchBtn">
            <i class="fa-solid fa-magnifying-glass"></i>
        </button>
    </form>

    <!-- User Menu -->
    <div class="userMenu">

        <img class="userImg" src="../images/avatars/avatar1.jpeg" alt="avatar" />

        <div class="dropDown">

            <div class="profileHeader" id="openProfiles">
                <img class="navAvatar" src="../images/avatars/avatar1.jpeg" alt="avatar">

                <span id="navProfileName">
                    User
                </span>

                <i class="fas fa-chevron-right" id="profileArrow"></i>
            </div>

            <a href="/profile/">Manage Profile</a>
            <a href="#">Account</a>
            <a href="#">Historial</a>

            <a href="https://instagram.com/eilishtvwebsite">
                Instagram
            </a>

            <a href="https://instagram.com/santbeq">
                Personal Instagram
            </a>

            <a href="mailto:eilishtvmanagement@gmail.com">
                Help
            </a>

            <a href="#" id="logoutBtn">
                Log Out
            </a>

        </div>
    </div>

</nav>

<div class="hero" id="hero">

  <div class="overlay"></div>

  <div class="content">

    <img id="logo" class="logo">

    <div class="buttons">

      <button id="playBtn">
        <i class="fa-solid fa-play"></i>
        Play
      </button>

      <button class="myListBtn">
        <i class="fa-solid fa-plus"></i>
        Mi Lista
      </button>

    </div>

    <div class="meta">
      <span id="year"></span>
    </div>

    <div class="tags" id="tags"></div>

    <p id="desc"></p>

  </div>

</div>

<script type="module">

import {
  getFirestore,
  doc,
  setDoc,
  deleteDoc,
  getDoc,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import { auth } from "../../js/auth.js";

// ===============================================
// LOADER UTILS
// ===============================================
const globalLoader = document.getElementById("globalLoader");

function hideLoader() {
  if (globalLoader) {
    globalLoader.classList.add("hidden");
  }
}

const params = new URLSearchParams(window.location.search);

const id = params.get("id");

const db = getFirestore();

const urlBaseID =
"https://opensheet.elk.sh/1PjRQDpbZQ6nscdRzlEOtwNpeEiyeEOGjkic6mggNEBY/BaseID";

const urlCatalogo =
"https://opensheet.elk.sh/1PjRQDpbZQ6nscdRzlEOtwNpeEiyeEOGjkic6mggNEBY/1";

Promise.all([
  fetch(urlBaseID).then(r => r.json()),
  fetch(urlCatalogo).then(r => r.json())
])

.then(([dataBase, dataCatalogo]) => {

  const itemBase =
    dataBase.find(
      x => String(x.id).trim() === String(id).trim()
    );

  const itemCatalogo =
    dataCatalogo.find(
      x => String(x.id).trim() === String(id).trim()
    );

  if (!itemBase) {
    hideLoader(); // Si no se encuentra el ítem, remueve el loader para no romper la UX
    return;
  }

  /* HERO BG */

  const hero =
    document.getElementById("hero");

  const bg =
    `url(${itemBase["background-image"]})`;

  function applyBackground() {

    hero.style.setProperty("--bg-img", bg);

    if (window.innerWidth <= 768) {

      hero.style.backgroundImage = "none";

    } else {

      hero.style.backgroundImage = bg;
    }
  }

  applyBackground();

  window.addEventListener(
    "resize",
    applyBackground
  );

  /* CONTENT */

  const logoImg = document.getElementById("logo");
  logoImg.src = itemBase.logo || "";

  document.getElementById("year").textContent =
    itemBase.year || "";

  document.getElementById("desc").textContent =
    itemBase.description || "";

  const tagsContainer =
    document.getElementById("tags");

  if (itemBase.genres) {

    itemBase.genres
      .split(",")

      .forEach(tag => {

        const span =
          document.createElement("span");

        span.className = "tag";

        span.textContent =
          tag.trim();

        tagsContainer.appendChild(span);

      });
  }

  // Esperar a que la imagen del logo cargue de verdad antes de quitar la pantalla de carga
  if (logoImg.src) {
    logoImg.addEventListener("load", hideLoader);
    logoImg.addEventListener("error", hideLoader); // Por si la URL de la imagen llega a fallar
  } else {
    hideLoader();
  }

  /* =========================
      WATCH HISTORY
  ========================= */

  const saveToHistory =
    async (user) => {

      if (!user) return;

      let portadaImg =
        itemCatalogo
          ? itemCatalogo.imagen
          : "";

      if (
        portadaImg &&
        !portadaImg.startsWith("http")
      ) {

        portadaImg =
          portadaImg.replace(
            /^(\.\.\/|\.\/)+/,
            ""
          );

        if (!portadaImg.startsWith("/")) {
          portadaImg = "/" + portadaImg;
        }
      }

      const historyRef =
        doc(
          db,
          "users",
          user.uid,
          "history",
          id
        );

      await setDoc(historyRef, {

        id: id,

        titulo:
          itemBase.titulo ||
          "Sin título",

        imagen: portadaImg,

        watchedAt:
          serverTimestamp()
      });
  };

  /* PLAY */

  document.getElementById("playBtn").onclick = () => {

    const user =
      auth.currentUser;

    if (user) {

      saveToHistory(user)
        .finally(() => {

          window.location.href =
            "/browse/video.html?id=" + id;

        });

    } else {

      window.location.href =
        "/browse/video.html?id=" + id;
    }
  };

  /* =========================
      MI LISTA
  ========================= */

  const listBtn =
    document.querySelector(".myListBtn");

  auth.onAuthStateChanged(
    async (user) => {

      if (!user) {

        listBtn.onclick = () => {
          alert("Debes iniciar sesión.");
        };

        return;
      }

      const listDocRef =
        doc(
          db,
          "users",
          user.uid,
          "myList",
          id
        );

      const checkDoc =
        await getDoc(listDocRef);

      let isAdded =
        checkDoc.exists();

      function updateBtnUI(added) {

        if (added) {

          listBtn.innerHTML =
            `<i class="fa-solid fa-check"></i> En mi Lista`;

          listBtn.style.background =
            "rgba(255,255,255,0.3)";

        } else {

          listBtn.innerHTML =
            `<i class="fa-solid fa-plus"></i> Mi Lista`;

          listBtn.style.background =
            "rgba(255,255,255,0.15)";
        }
      }

      updateBtnUI(isAdded);

      listBtn.onclick =
        async () => {

          try {

            if (isAdded) {

              await deleteDoc(listDocRef);

              isAdded = false;

            } else {

              let portadaImg =
                itemCatalogo
                  ? itemCatalogo.imagen
                  : "";

              if (
                portadaImg &&
                !portadaImg.startsWith("http")
              ) {

                portadaImg =
                  portadaImg.replace(
                    /^(\.\.\/|\.\/)+/,
                    ""
                  );

                if (!portadaImg.startsWith("/")) {
                  portadaImg = "/" + portadaImg;
                }
              }

              await setDoc(listDocRef, {

                id: id,

                titulo:
                  itemBase.titulo ||
                  "Sin título",

                imagen:
                  portadaImg,

                addedAt:
                  new Date()
              });

              isAdded = true;
            }

            updateBtnUI(isAdded);

          } catch (error) {

            console.error(
              "Error Mi Lista:",
              error
            );
          }
      };
    });

})

.catch(err => {
  console.error(
    "Error cargando datos:",
    err
  );
  hideLoader(); // Remueve el loader en caso de error de red crítico
});

</script>



<footer class="footer"></footer>

<script src="../../nav.js"></script>

</body>
</html>
