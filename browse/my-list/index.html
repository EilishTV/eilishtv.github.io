<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi Lista - EilishTV</title>
    <link rel="stylesheet" href="../../css/index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body { background: #040714; font-family: Arial, sans-serif; margin: 0; color: white; }
        .list-container { padding: 110px 20px 40px; }
        .list-title { margin-left: 10px; margin-bottom: 30px; font-size: 1.8rem; }

        /* Cuadrícula idéntica a tu genreGrid */
        .myListGrid {
            display: grid;
            gap: 16px;
            grid-template-columns: repeat(5, 1fr);
        }

        /* Estilo idéntico a genreItem para que parezcan portadas reales */
        .videoItem {
            position: relative;
            aspect-ratio: 16 / 9; 
            border-radius: 10px;
            overflow: hidden;
            cursor: pointer;
            border: 3px solid rgba(249, 249, 249, 0.1);
            box-shadow: rgb(0 0 0 / 69%) 0px 26px 30px -10px,
                        rgb(0 0 0 / 73%) 0px 16px 10px -10px;
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .videoItem img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover; /* Esto asegura que la portada llene el espacio */
        }

        .videoItem:hover {
            transform: scale(1.05);
            border-color: rgba(249, 249, 249, 0.8);
            box-shadow: rgb(0 0 0 / 80%) 0px 40px 58px -16px;
        }

        @media (max-width: 1024px) { .myListGrid { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 600px) { 
            .myListGrid { grid-template-columns: repeat(2, 1fr); }
            .list-title { font-size: 1.4rem; }
        }
    </style>
</head>
<body>

    <div id="mainNav"></div>

    <div class="list-container">

    <h2 class="list-title">
        Mi Lista
    </h2>

    <div
        class="myListGrid"
        id="myListGrid"
    ></div>

</div>

    <script type="module">
        import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
        import { auth } from "../../js/auth.js";

        const db = getFirestore();
        const grid = document.getElementById("myListGrid");

        auth.onAuthStateChanged(async (user) => {
            if (user) {
                try {
                    const listRef = collection(db, "users", user.uid, "myList");
                    const q = query(listRef, orderBy("addedAt", "desc"));
                    const querySnapshot = await getDocs(q);

                    grid.innerHTML = ""; 

                    if (querySnapshot.empty) {
                        grid.innerHTML = `<p style="margin-left:10px; color:gray;">No hay nada en tu lista.</p>`;
                        return;
                    }

                    querySnapshot.forEach((docSnap) => {
                        const data = docSnap.data();
                        
                        // Ajuste de ruta de imagen para que siempre funcione
                        let finalImg = data.imagen;
                        if (!finalImg.startsWith("http")) {
                            // Si la ruta guardada empieza con /, le ponemos los ../.. para subir desde /browse/my-list/
                            finalImg = "../../" + finalImg.replace(/^\//, "");
                        }

                        const div = document.createElement("div");
                        div.className = "videoItem";
                        div.innerHTML = `<img src="${finalImg}" alt="${data.titulo}">`;

                        div.onclick = () => {
                            window.location.href = `../watch/index.html?id=${data.id}`;
                        };

                        grid.appendChild(div);
                    });
                } catch (error) {
                    console.error(error);
                }
            }
        });
    </script>
    <script src="../../nav.js"></script>
</body>
</html>
