<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Series</title>

<link rel="stylesheet" href="../../css/index.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
  margin:0;
  background:#000;
  color:#fff;
  font-family:sans-serif;
  overflow-x:hidden;
}

.hero{
  min-height:100vh;
  background-size:cover;
  background-position:center;
  background-attachment:fixed;

  display:flex;
  align-items:center;
  padding:60px;

  position:relative;
  box-sizing:border-box;
  overflow:hidden;

  background-color:#1A1D29;
}

/* overlay desktop NUEVO */

.overlay{
  position:absolute;
  inset:0;

  background:
  linear-gradient(
    to bottom,
    rgba(26,29,41,0.15) 0%,
    rgba(26,29,41,0.45) 45%,
    rgba(26,29,41,0.88) 78%,
    #1A1D29 100%
  ),
  linear-gradient(
    to right,
    rgba(26,29,41,0.95) 15%,
    rgba(26,29,41,0.65) 45%,
    rgba(26,29,41,0.15) 70%,
    transparent 100%
  );

  z-index:1;
}

/* CONTENT */
.content{
  position:relative;
  z-index:3;
  margin-top:10%;
  max-width:500px;
}

/* LOGO */
.logo{
  width:300px;
  height:120px;
  object-fit:contain;
  object-position:left center;
  margin-bottom:25px;
}

/* BUTTONS */
.buttons{
  display:flex;
  align-items:center;
  gap:12px;
}

button{
  height:48px;
  padding:0 28px;
  border:none;
  font-size:15px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  cursor:pointer;
  transition:all 0.2s ease;
  outline:none;
}

#playBtn{
  background:#fff;
  color:#000;
  font-weight:bold;
  border-radius:50px;
}

#playBtn:hover{
  background:#e6e6e6;
}

.myListBtn{
  background:rgba(255,255,255,0.15);
  border:1px solid rgba(255,255,255,0.3);
  border-radius:50px;
  color:#fff;
}

.meta{
  margin-top:12px;
  font-size:14px;
  color:#ccc;
}

.tags{
  margin-top:10px;
  display:flex;
  flex-wrap:wrap;
  gap:8px;
}

.tag{
  background:rgba(255,255,255,0.15);
  border:1px solid rgba(255,255,255,0.25);
  padding:6px 12px;
  border-radius:20px;
  font-size:12px;
  color:#fff;
}

#desc{
  margin-top:15px;
  line-height:1.5;
  color:#ddd;
}

/* EPISODES */
.episodesSection{
  padding:40px 60px;
  background:#111;
}

.seasonSelect{
  margin-bottom:30px;
}

.seasonSelect select{
  background:#1b1b1b;
  color:#fff;
  border:none;
  padding:12px 18px;
  border-radius:10px;
  font-size:15px;
}

/* EPISODES */

/* EPISODES */

.episodesSection{
  padding:40px 60px;
  background:#1A1D29;
}

.seasonSelect,
.episodesWrapper{
  transform:translateY(-90px);

  position:relative;
  z-index:20;
}
.episodesList{
  display:flex;
  gap:20px;

  overflow-x:auto;
  overflow-y:hidden;

  scroll-behavior:smooth;

  /* espacio para hover + borde */
  padding:
    8px
    6px
    18px
    6px;

  margin:
    -8px
    -6px
    0
    -6px;
}


.episodesList::-webkit-scrollbar{
  height:6px;
}

.episodesList::-webkit-scrollbar-thumb{
  background:#3a3a3a;
  border-radius:999px;
}

/* CARD */

.episodeCard{
  width:280px;
  flex-shrink:0;
  cursor:pointer;
  transition:transform .25s ease;
}

.episodeCard:hover{
  transform:scale(1.02);
}

/* IMAGE WRAPPER */

.episodeImageWrap{
  position:relative;
  border-radius:18px;
  margin-bottom:12px;
}

/* IMAGE */

.episodeImage{
  width:100%;
  aspect-ratio:16/9;
  object-fit:cover;
  border-radius:14px;
  display:block;
  position:relative;
  z-index:2;
}

/* TITILATING BORDER */

.episodeImageWrap::before{
  content:"";
  position:absolute;

  inset:-3px;

  border-radius:18px;

  border:2px solid
  rgba(255,255,255,0);

  opacity:0;

  z-index:1;

  transition:
    opacity .25s ease,
    border-color .25s ease;
}

/* HOVER EFFECT */

.episodeCard:hover
.episodeImageWrap::before{

  opacity:1;

  border-color:
  rgba(255,255,255,.75);

  animation:
  pulseBorder 1.2s infinite;
}

/* TITILEO */

@keyframes pulseBorder{

  0%{
    opacity:.35;
    filter:brightness(1);
  }

  50%{
    opacity:1;
    filter:brightness(1.55);
  }

  100%{
    opacity:.35;
    filter:brightness(1);
  }
}

/* CONTENT */

.episodeContent{
  width:100%;
}

.episodeNumber{
  font-size:12px;
  color:#8f8f8f;
  margin-bottom:4px;
}

.episodeTitle{
  font-size:17px;
  font-weight:700;
  margin-bottom:8px;
  line-height:1.2;
}

.episodeDesc{
  color:#bdbdbd;
  line-height:1.45;
  font-size:14px;

  display:-webkit-box;
  -webkit-line-clamp:3;
  -webkit-box-orient:vertical;
  overflow:hidden;
}

/* MOBILE */

@media screen and (max-width:768px){

  .episodesSection{
    padding:20px;
  }

  .episodesList{
    gap:14px;
  }

  .episodeCard{
    width:220px;
  }

  .episodeTitle{
    font-size:15px;
  }

  .episodeDesc{
    font-size:13px;
  }

}

/* ===========================
   EPISODES ARROWS DESKTOP
=========================== */

.episodesWrapper{
  position:relative;
  width:100%;
}

/* FLECHAS */

.episodesArrow{
  position:absolute;
  top:42%;
  transform:translateY(-50%);

  width:54px !important;
  height:54px !important;
  min-width:54px;

  padding:0 !important;
  margin:0;

  border:none;
  border-radius:999px;

  background:rgba(140,140,140,.18) !important;

  backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);

  color:#fff !important;

  display:flex !important;
  align-items:center;
  justify-content:center;
  gap:0 !important;

  z-index:999;
  cursor:pointer;

  opacity:.75;

  transition:
    transform .28s ease,
    opacity .28s ease,
    background .28s ease;
}

/* ICONO */

.episodesArrow i{
  font-size:18px;
  pointer-events:none;
}

/* HOVER */

.episodesArrow:hover{
  opacity:1;

  background:
  rgba(180,180,180,.28)
  !important;

  transform:
  translateY(-50%)
  scale(1.08);
}

/* POSICIONES */

.episodesArrow.left{
  left:-22px;
}

.episodesArrow.right{
  right:-22px;
}

/* ESCONDER EN MOBILE */

@media screen and (max-width:768px){

  .episodesArrow{
    display:none !important;
  }

}

/* MOBILE */

@media screen and (max-width:768px){

  .episodesSection{
    padding:20px;
  }

  .episodesList{
    gap:14px;
  }

  .episodeCard{
    width:220px;
  }

  .episodeTitle{
    font-size:15px;
  }

  .episodeDesc{
    font-size:13px;
  }

}
/* LOADER */
.loader-container{
  position:fixed;
  inset:0;
  background:#000;
  z-index:9999;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:0.4s;
}

.loader-container.hidden{
  opacity:0;
  visibility:hidden;
  pointer-events:none;
}

.spinner{
  width:50px;
  height:50px;
  border:4px solid rgba(255,255,255,0.1);
  border-top-color:#fff;
  border-radius:50%;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  to{
    transform:rotate(360deg);
  }
}

/* MOBILE */
@media screen and (max-width:768px){

  body{
    background:#1A1D29;
  }

  .hero{
    height:auto;
    min-height:100dvh;
    flex-direction:column;
    padding:0;
    background:none !important;
    margin-top:70px;
    position:relative;
    overflow:hidden;
  }

  .hero::before{
    content:"";
    position:relative;
    z-index:1;
    width:100%;
    height:240px;
    display:block;

    background:
      linear-gradient(
        to bottom,
        rgba(26,29,41,0) 35%,
        rgba(26,29,41,0.45) 60%,
        rgba(26,29,41,0.82) 82%,
        #1A1D29 100%
      ),
      var(--bg-img);

    background-size:cover;
    background-position:center;

    margin-bottom:-3px;
  }

  .hero::after{
    content:"";
    position:relative;
    z-index:2;
    width:100%;
    height:90px;
    display:block;

    margin-top:-90px;

    background:linear-gradient(
      to bottom,
      rgba(26,29,41,0) 0%,
      rgba(26,29,41,0.96) 82%,
      #1A1D29 100%
    );
  }

  .overlay{
    display:none;
  }

  .content{
    position:relative;
    z-index:5;
    margin-top:-35px;
    padding:20px;
    max-width:100%;
    width:100%;
    box-sizing:border-box;
  }

  .logo{
    width:200px;
    max-width:55vw;
    height:80px;
    margin-top:-60px;
    margin-bottom:15px;
  }

  .buttons{
    width:100%;
  }

  button{
    flex:1;
    height:46px;
    font-size:14px;
    padding:0 10px;
  }

  .episodesSection{
    padding:20px;
  }

  .episodeCard{
    padding:16px;
  }

  .episodeTitle{
    font-size:17px;
  }

}

</style>
</head>

<body>

<div id="globalLoader" class="loader-container">
  <div class="spinner"></div>
</div>

<nav>

    <a class="navLogo" href="/index.html">
        <img src="../../images/extras/logo.png" alt="EilishTV"/>
    </a>

    <div class="navMenu">
        <a href="/browse/">Inicio</a>
        <a href="#">Peliculas</a>
        <a href="#">Shows</a>
        <a href="/browse/my-list/">Mi Lista</a>
    </div>

</nav>

<div class="hero" id="hero">

  <div class="overlay"></div>

  <div class="content">

    <img id="logo" class="logo">

    <div class="buttons">

      <button id="playBtn">
        <i class="fa-solid fa-play"></i>
        Ver T1.E1
      </button>

      <button class="myListBtn">
        <i class="fa-solid fa-plus"></i>
        Mi Lista
      </button>

    </div>

    <div class="meta">
      <span id="year"></span>
    </div>

    <div class="tags" id="tags"></div>

    <p id="desc"></p>

  </div>

</div>

<section class="episodesSection">

  <div class="seasonSelect">
    <select id="seasonSelector"></select>
  </div>

  <div class="episodesWrapper">

  <button class="episodesArrow left" id="episodesLeft">
    <i class="fas fa-chevron-left"></i>
  </button>

  <div class="episodesList" id="episodesList"></div>

  <button class="episodesArrow right" id="episodesRight">
    <i class="fas fa-chevron-right"></i>
  </button>

</div>

</section>

<script type="module" src="../../js/series.js"></script>

<footer class="footer"></footer>

<script src="../../nav.js"></script>

</body>
</html>
