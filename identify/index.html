<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EilishTV!</title>
    <link rel="stylesheet" href="../css/identify.css">

    <style>
        /* --- ESTILOS DE MANTENIMIENTO --- */
        #maintenance-overlay {
            display: flex; 
            position: fixed;
            top: 0; left: 0; 
            width: 100vw; 
            height: 100vh;
            z-index: 99999; /* Máximo posible */
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
            font-family: sans-serif;
            background-color: #000;
            
            background-image: url('../../images/desktopcs.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        @media (max-width: 768px) {
            #maintenance-overlay {
                background-image: url('../../images/movilcs.png');
                background-size: cover; 
                background-position: center center;
            }
        }

        .maint-card {
            padding: 20px;
            width: 90%;
            max-width: 450px;
            background: transparent;
        }

        #countdown {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 25px 0;
        }
        .time-box {
            background: rgba(0, 0, 0, 0.6); 
            padding: 10px;
            border-radius: 10px;
            min-width: 65px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .time-box span { display: block; font-size: 1.5rem; font-weight: bold; }
        .time-box label { font-size: 0.6rem; text-transform: uppercase; }

        .code-group { margin-top: 30px; }
        .code-inputs { display: flex; gap: 10px; justify-content: center; margin-top: 10px; }
        .code-box {
            width: 45px;
            height: 55px;
            background: rgba(0, 0, 0, 0.7); 
            border: 2px solid white;
            border-radius: 8px;
            text-align: center;
            font-size: 1.5rem;
            color: white;
            outline: none;
            -webkit-appearance: none; /* Fix para iOS */
        }
        /* Evita zoom automático en iPhone al hacer focus */
        @media screen and (max-width: 768px) {
            .code-box { font-size: 16px; } 
        }
    </style>
</head>

<body style="overflow: hidden; width: 100%; height: 100%;">

    <div id="maintenance-overlay">
        <div class="maint-card">
            <div id="countdown">
                <div class="time-box"><span id="days">00</span><label>Días</label></div>
                <div class="time-box"><span id="hours">00</span><label>Hrs</label></div>
                <div class="time-box"><span id="minutes">00</span><label>Min</label></div>
                <div class="time-box"><span id="seconds">00</span><label>Seg</label></div>
            </div>

            <div class="code-group">
                <p style="font-size: 0.8rem; text-shadow: 1px 1px 5px #000;">Access Code</p>
                <div class="code-inputs">
                    <input type="number" pattern="\d*" inputmode="numeric" class="code-box">
                    <input type="number" pattern="\d*" inputmode="numeric" class="code-box">
                    <input type="number" pattern="\d*" inputmode="numeric" class="code-box">
                    <input type="number" pattern="\d*" inputmode="numeric" class="code-box">
                </div>
            </div>
        </div>
    </div>

    <!-- CONTENIDO ORIGINAL -->
    <header class="topBar">
        <a href="login/" class="loginLink">Log in</a>
    </header>

    <section class="hero">
        <img src="../images/extras/logo.png" class="logo" alt="EilishTV">
        <h1 class="title">Exclusive shows, movies, and documentaries...</h1>
        <div class="cta">
            <input type="email" id="emailInput" placeholder="Enter your email">
            <button id="startBtn">Start</button>
        </div>
    </section>

    <!-- CARGA EL JS ORIGINAL PERO CON PRECAUCIÓN -->
    <script src="../js/identify.js" defer></script>

    <script>
        // --- VARIABLE DE CONTROL ---
        const isMaintenanceActive = true;

        // --- LÓGICA DEL CONTADOR ---
        function timer() {
            const now = new Date();
            const saturday = new Date();
            // Esto busca el PRÓXIMO sábado 00:00
            saturday.setDate(now.getDate() + (6 - now.getDay())); 
            saturday.setHours(0, 0, 0, 0);

            const diff = saturday - now;
            
            if (diff <= 0 || !isMaintenanceActive) {
                unlockPage();
                return;
            }

            document.getElementById('days').innerText = Math.floor(diff / (1000 * 60 * 60 * 24)).toString().padStart(2, '0');
            document.getElementById('hours').innerText = Math.floor((diff / (1000 * 60 * 60)) % 24).toString().padStart(2, '0');
            document.getElementById('minutes').innerText = Math.floor((diff / 1000 / 60) % 60).toString().padStart(2, '0');
            document.getElementById('seconds').innerText = Math.floor((diff / 1000) % 60).toString().padStart(2, '0');
        }
        
        function unlockPage() {
            document.getElementById('maintenance-overlay').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        setInterval(timer, 1000);
        timer();

        // --- LÓGICA DE LAS CAJITAS (Optimizado para móvil) ---
        const inputs = document.querySelectorAll('.code-box');
        const SECRET_CODE = "1201"; 

        inputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                // Solo tomar el último carácter ingresado
                if (e.target.value.length > 1) {
                    e.target.value = e.target.value.slice(-1);
                }

                if (e.target.value.length === 1 && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
                
                let code = "";
                inputs.forEach(i => code += i.value);
                if (code === SECRET_CODE) {
                    unlockPage();
                }
            });

            input.addEventListener('keydown', (e) => {
                if (e.key === "Backspace" && !e.target.value && index > 0) {
                    inputs[index - 1].focus();
                }
            });
        });
    </script>
</body>
</html>
