<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EilishTV!</title>
    <link rel="stylesheet" href="../css/identify.css">

    <style>
        /* --- ESTILOS DE MANTENIMIENTO --- */
        #maintenance-overlay {
            display: flex; 
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10000;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
            font-family: sans-serif;
            
            /* IMAGEN DESKTOP SIN CAPAS NEGRAS */
            background-image: url('../../images/desktopcs.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        @media (max-width: 768px) {
            #maintenance-overlay {
                /* IMAGEN CELULAR - Sin capas negras y cubriendo todo */
                background-image: url('../../images/movilcs.png');
                background-size: cover; 
                background-position: center center;
            }
            .maint-title { font-size: 1.8rem !important; }
        }

        /* QUITAMOS EL FONDO NEGRO DE LA CARD */
        .maint-card {
            padding: 20px;
            width: 90%;
            max-width: 450px;
            background: transparent; /* Totalmente transparente */
        }

        .maint-logo-img { 
            width: 140px; 
            margin-bottom: 15px; 
            filter: drop-shadow(0 0 8px rgba(0,0,0,0.5)); /* Sombra para que el logo resalte */
        }

        .maint-title { 
            font-size: 2.5rem; 
            margin-bottom: 10px; 
            font-weight: bold; 
            text-shadow: 2px 2px 15px rgba(0,0,0,0.8); /* Sombra al texto para leer sobre la imagen */
        }

        .maint-card p {
            text-shadow: 1px 1px 10px rgba(0,0,0,0.8);
        }
        
        /* Contador con estilo flotante */
        #countdown {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 25px 0;
        }
        .time-box {
            background: rgba(0, 0, 0, 0.3); /* Un fondo muy sutil solo para los números */
            padding: 10px;
            border-radius: 10px;
            min-width: 65px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .time-box span { display: block; font-size: 1.5rem; font-weight: bold; }
        .time-box label { font-size: 0.6rem; text-transform: uppercase; }

        /* Cajitas de Código */
        .code-group { margin-top: 30px; }
        .code-inputs { display: flex; gap: 10px; justify-content: center; margin-top: 10px; }
        .code-box {
            width: 45px;
            height: 55px;
            background: rgba(0, 0, 0, 0.5); /* Fondo oscuro para que se vea el código */
            border: 2px solid white;
            border-radius: 8px;
            text-align: center;
            font-size: 1.5rem;
            color: white;
            outline: none;
        }
        .code-box:focus { border-color: #00ff00; }
    </style>
</head>

<body>

    <!-- CAPA DE MANTENIMIENTO -->
    <div id="maintenance-overlay">
        <div class="maint-card">
            <div id="countdown">
                <div class="time-box"><span id="days">00</span><label>Días</label></div>
                <div class="time-box"><span id="hours">00</span><label>Hrs</label></div>
                <div class="time-box"><span id="minutes">00</span><label>Min</label></div>
                <div class="time-box"><span id="seconds">00</span><label>Seg</label></div>
            </div>

            <div class="code-group">
                <p style="font-size: 0.8rem; text-shadow: 1px 1px 5px #000;">Access Code</p>
                <div class="code-inputs">
                    <input type="text" maxlength="1" class="code-box">
                    <input type="text" maxlength="1" class="code-box">
                    <input type="text" maxlength="1" class="code-box">
                    <input type="text" maxlength="1" class="code-box">
                </div>
            </div>
        </div>
    </div>

    <!-- TODO TU CONTENIDO ORIGINAL SIGUE ABAJO IGUAL -->
    <header class="topBar">
        <a href="login/" class="loginLink">Log in</a>
    </header>

    <section class="hero">
        <img src="../images/extras/logo.png" class="logo" alt="EilishTV">
        <h1 class="title">Exclusive shows, movies, and documentaries from Billie Eilish and more.</h1>
        <p class="price">Completely free</p>
        <p class="enter">Enter your email to get started.</p>
        <div class="cta">
            <input type="email" id="emailInput" placeholder="Enter your email">
            <button id="startBtn">Start</button>
        </div>
    </section>

    <script src="../js/identify.js"></script>

    <script>
        // --- LÓGICA DEL CONTADOR ---
        function timer() {
            const now = new Date();
            const saturday = new Date();
            saturday.setDate(now.getDate() + (6 - now.getDay())); 
            saturday.setHours(0, 0, 0, 0);

            const diff = saturday - now;
            if (diff <= 0) {
                document.getElementById('maintenance-overlay').style.display = 'none';
                return;
            }

            document.getElementById('days').innerText = Math.floor(diff / (1000 * 60 * 60 * 24)).toString().padStart(2, '0');
            document.getElementById('hours').innerText = Math.floor((diff / (1000 * 60 * 60)) % 24).toString().padStart(2, '0');
            document.getElementById('minutes').innerText = Math.floor((diff / 1000 / 60) % 60).toString().padStart(2, '0');
            document.getElementById('seconds').innerText = Math.floor((diff / 1000) % 60).toString().padStart(2, '0');
        }
        setInterval(timer, 1000);
        timer();

        // --- LÓGICA DE LAS 4 CAJITAS ---
        const inputs = document.querySelectorAll('.code-box');
        const SECRET_CODE = "1201"; // TU CÓDIGO SECRETO

        inputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                if (e.target.value.length === 1 && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
                let code = "";
                inputs.forEach(i => code += i.value);
                if (code === SECRET_CODE) {
                    document.getElementById('maintenance-overlay').style.display = 'none';
                }
            });
            input.addEventListener('keydown', (e) => {
                if (e.key === "Backspace" && !e.target.value && index > 0) {
                    inputs[index - 1].focus();
                }
            });
        });
    </script>

</body>
</html>
