<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | EilishTV</title>
    <link rel="stylesheet" href="../../css/identify.css">
</head>

<body class="loginPage">
    <div class="loginBox">
        <img src="../../images/extras/logo.png" class="log-logo" alt="EilishTV">

        <h2>Enter your email to continue</h2>

        <p class="desc">
            Log in to EilishTV with your account. If you don't have one,
            you will be prompted to create one.
        </p>

        <input type="email" id="emailInput" placeholder="Email">
        <input type="password" id="passwordInput" placeholder="Password">
        
        <p class="forgot-password">
            <a href="#" id="forgotPasswordBtn">Forgot your password?</a>
        </p>

        <p class="verify-account" style="margin-top: 8px; font-size: 14px; text-align: center;">
            <a href="#" id="verifyAccountBtn" style="color: #666; text-decoration: none; transition: color 0.2s;">Verify my account</a>
        </p>

        <p id="formError" class="formError"></p>
        <button id="loginBtn">Log in</button>
    </div>

    <script src="../../js/identify.js"></script>
    <script type="module" src="../../js/auth.js"></script>
</body>
</html>
